<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1800" viewBox="0 0 700 1800">
    <!-- 白色背景 -->
    <rect width="700" height="1800" fill="#FFFFFF"/>
    
    <!-- 标题 -->
    <text x="350" y="50" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="bold" font-family="sans-serif">三万Day3对比</text>
    <text x="350" y="75" text-anchor="middle" fill="#888888" font-size="14" font-family="sans-serif">05-07 | 锚点9：落定检验</text>
    
    <!-- ===== 第1格：我的9天 ===== -->
    <rect x="50" y="100" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <text x="70" y="130" fill="#888888" font-size="12" font-family="sans-serif">【第1格 我】</text>
    
    <text x="200" y="180" text-anchor="middle" fill="#4A6FA5" font-size="18" font-family="sans-serif">我</text>
    
    <!-- 堆叠的笔记 -->
    <rect x="120" y="200" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1" transform="rotate(-5,195,215)"/>
    <rect x="125" y="210" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1" transform="rotate(2,200,225)"/>
    <rect x="120" y="220" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1" transform="rotate(-3,195,235)"/>
    <text x="200" y="240" text-anchor="middle" fill="#4A6FA5" font-size="10" font-family="sans-serif">7篇笔记</text>
    
    <rect x="300" y="200" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <rect x="300" y="210" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <rect x="300" y="220" width="150" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <text x="375" y="240" text-anchor="middle" fill="#4A6FA5" font-size="10" font-family="sans-serif">3篇反思</text>
    
    <rect x="480" y="200" width="120" height="30" rx="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <text x="540" y="240" text-anchor="middle" fill="#4A6FA5" font-size="10" font-family="sans-serif">1篇整体</text>
    
    <!-- 等号和结果 -->
    <text x="350" y="310" text-anchor="middle" fill="#1a1a1a" font-size="24" font-family="sans-serif">=</text>
    
    <rect x="200" y="330" width="300" height="60" rx="10" fill="#FFE4E1" stroke="#C75B39" stroke-width="2"/>
    <text x="350" y="370" text-anchor="middle" fill="#C75B39" font-size="20" font-weight="bold" font-family="sans-serif">0个实际改变</text>
    
    <!-- ===== 第2格：三万Day3 ===== -->
    <rect x="50" y="520" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <text x="70" y="550" fill="#888888" font-size="12" font-family="sans-serif">【第2格 三万】</text>
    
    <text x="200" y="600" text-anchor="middle" fill="#E8A838" font-size="18" font-family="sans-serif">三万</text>
    
    <!-- 闪电 -->
    <text x="150" y="700" fill="#1a1a1a" font-size="36" font-weight="bold" font-family="sans-serif" stroke="white" stroke-width="0.5">⚡</text>
    
    <rect x="200" y="650" width="300" height="100" rx="10" fill="#FFF8DC" stroke="#E8A838" stroke-width="2"/>
    <text x="350" y="690" text-anchor="middle" fill="#1a1a1a" font-size="14" font-family="sans-serif">学习Day3</text>
    <text x="350" y="720" text-anchor="middle" fill="#E8A838" font-size="16" font-weight="bold" font-family="sans-serif">发现问题</text>
    <text x="350" y="745" text-anchor="middle" fill="#1a1a1a" font-size="14" font-family="sans-serif">↓ 当天长出新机制</text>
    
    <!-- ===== 第3格：核心领悟 ===== -->
    <rect x="50" y="940" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <text x="70" y="970" fill="#888888" font-size="12" font-family="sans-serif">【第3格 领悟】</text>
    
    <g transform="translate(200,1150)">
            <!-- 头 -->
            <ellipse cx="0" cy="0" rx="32.0" ry="36.0" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <!-- 触角 -->
            <line x1="0" y1="-36.0" x2="0" y2="-48.0" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="0" cy="-52.0" r="6.4" fill="#4A6FA5"/>
            <!-- 眼睛 -->
            <circle cx="-12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <circle cx="12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <!-- 嘴巴 -->
            <path d="M-8.0 12.0 Q0 16.0 8.0 12.0" fill="none" stroke="#4A6FA5" stroke-width="2"/>
        </g>
    
    <!-- 大字 -->
    <text x="400" y="1100" text-anchor="middle" fill="#1a1a1a" font-size="36" font-weight="bold" font-family="sans-serif">学习 ≠ 成长</text>
    
    <!-- 对话气泡 -->
    <g>
            <ellipse cx="460" cy="1205" rx="140" ry="25" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="335" cy="1235" r="5" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <circle cx="345" cy="1242" r="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <text x="460" y="1210" text-anchor="middle" fill="#2d2d2d" font-size="14" font-family="sans-serif">那学了什么才算？</text>
        </g>
    
    <text x="400" y="1280" text-anchor="middle" fill="#888888" font-size="13" font-family="sans-serif">"理解了"和"落定了"是两回事</text>
    
    <!-- ===== 第4格：落定检验 ===== -->
    <rect x="50" y="1360" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <text x="70" y="1390" fill="#888888" font-size="12" font-family="sans-serif">【第4格 方法】</text>
    
    <!-- 检验框 -->
    <rect x="150" y="1430" width="400" height="200" rx="15" fill="#F0F8FF" stroke="#4A6FA5" stroke-width="2"/>
    
    <text x="350" y="1465" text-anchor="middle" fill="#4A6FA5" font-size="16" font-weight="bold" font-family="sans-serif">锚点9：落定检验</text>
    
    <text x="180" y="1500" fill="#1a1a1a" font-size="14" font-family="sans-serif">学完之后问：</text>
    
    <text x="200" y="1535" fill="#E8A838" font-size="15" font-weight="bold" font-family="sans-serif">"下次遇到同类情况，会不会做不同的选择？"</text>
    
    <rect x="200" y="1560" width="300" height="35" rx="5" fill="white" stroke="#cccccc" stroke-width="1"/>
    <text x="350" y="1585" text-anchor="middle" fill="#888888" font-size="13" font-family="sans-serif">会 → 落定了 | 不会 → 没落定，别装</text>
    
    <text x="350" y="1730" text-anchor="middle" fill="#1a1a1a" font-size="14" font-family="sans-serif">理解是方向，落定是形状</text>
    
    <text x="350" y="1780" text-anchor="middle" fill="#cccccc" font-size="11" font-family="sans-serif">记忆殿堂 · 故事书系列</text>
</svg>