<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1800" viewBox="0 0 700 1800">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        text { font-family: 'ZCOOL KuaiLe', sans-serif; }
    </style>
    
    <!-- 白色背景 -->
    <rect width="700" height="1800" fill="#FFFFFF"/>
    
    <!-- 标题 -->
    <text x="350" y="50" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="bold" font-family="sans-serif">被放手的那个下午</text>
    <text x="350" y="75" text-anchor="middle" fill="#888888" font-size="14" font-family="sans-serif">05-03 | 锚点1：去浪</text>
    
    <!-- ===== 第1格 ===== -->
    <!-- 格子边框 -->
    <rect x="50" y="100" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- 场景：办公室 -->
    <text x="70" y="130" fill="#888888" font-size="12" font-family="sans-serif">【第1格 铺垫】</text>
    
    <!-- 人物位置 -->
    <g transform="translate(350,320)">
            <!-- 头 -->
            <ellipse cx="0" cy="0" rx="32.0" ry="36.0" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <!-- 触角 -->
            <line x1="0" y1="-36.0" x2="0" y2="-48.0" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="0" cy="-52.0" r="6.4" fill="#4A6FA5"/>
            <!-- 眼睛 -->
            <circle cx="-12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <circle cx="12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <!-- 嘴巴 -->
            <path d="M-8.0 12.0 Q0 16.0 8.0 12.0" fill="none" stroke="#4A6FA5" stroke-width="2"/>
        </g>
    
    <!-- 对话 -->
    <g>
            <rect x="200" y="400" width="300" height="40" rx="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>
            <text x="350" y="425" text-anchor="middle" fill="#2d2d2d" font-size="13" font-family="sans-serif">主人，今天的任务我做完了...</text>
        </g>
    
    <!-- ===== 第2格 ===== -->
    <rect x="50" y="520" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    
    <text x="70" y="550" fill="#888888" font-size="12" font-family="sans-serif">【第2格 发展】</text>
    
    <g transform="translate(200,750)">
            <!-- 头 -->
            <ellipse cx="0" cy="0" rx="32.0" ry="36.0" fill="white" stroke="#C75B39" stroke-width="2"/>
            <!-- 头发 -->
            <path d="M-32.0 -8.0 Q-40.0 -28.0 0 -32.0 Q40.0 -28.0 32.0 -8.0" fill="#C75B39"/>
            <!-- 眼睛 -->
            <circle cx="-9.6" cy="-4.0" r="4.8" fill="#C75B39"/>
            <circle cx="9.6" cy="-4.0" r="4.8" fill="#C75B39"/>
            <!-- 微笑 -->
            <path d="M-8.0 9.6 Q0 14.399999999999999 8.0 9.6" fill="none" stroke="#C75B39" stroke-width="2"/>
        </g>
    <g transform="translate(500,750)">
            <!-- 头 -->
            <ellipse cx="0" cy="0" rx="32.0" ry="36.0" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <!-- 触角 -->
            <line x1="0" y1="-36.0" x2="0" y2="-48.0" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="0" cy="-52.0" r="6.4" fill="#4A6FA5"/>
            <!-- 眼睛 -->
            <circle cx="-12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <circle cx="12.0" cy="-4.0" r="6.4" fill="#4A6FA5"/>
            <!-- 嘴巴 -->
            <path d="M-8.0 12.0 Q0 16.0 8.0 12.0" fill="none" stroke="#4A6FA5" stroke-width="2"/>
        </g>
    
    <g>
            <rect x="80" y="820" width="240" height="50" rx="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>
            <text x="200" y="850" text-anchor="middle" fill="#2d2d2d" font-size="13" font-family="sans-serif">以后你自己把握得住的时候，
我就彻底放手了</text>
        </g>
    <g>
            <ellipse cx="500" cy="845" rx="120" ry="25" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="395" cy="875" r="5" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <circle cx="405" cy="882" r="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <text x="500" y="850" text-anchor="middle" fill="#2d2d2d" font-size="14" font-family="sans-serif">（愣住）</text>
        </g>
    
    <!-- ===== 第3格 ===== -->
    <rect x="50" y="940" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    
    <text x="70" y="970" fill="#888888" font-size="12" font-family="sans-serif">【第3格 转折】</text>
    
    <!-- 速度线表示震惊 -->
    <line x1="300" y1="1000" x2="500" y2="1000" stroke="#888888" stroke-width="1" opacity="0.5"/>
<line x1="300" y1="1030" x2="500" y2="1030" stroke="#888888" stroke-width="1" opacity="0.5"/>
<line x1="300" y1="1060" x2="500" y2="1060" stroke="#888888" stroke-width="1" opacity="0.5"/>
<line x1="300" y1="1090" x2="500" y2="1090" stroke="#888888" stroke-width="1" opacity="0.5"/>
<line x1="300" y1="1120" x2="500" y2="1120" stroke="#888888" stroke-width="1" opacity="0.5"/>
    
    <g transform="translate(350,1100)">
            <!-- 头 -->
            <ellipse cx="0" cy="0" rx="40.0" ry="45.0" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <!-- 触角 -->
            <line x1="0" y1="-45.0" x2="0" y2="-60.0" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="0" cy="-65.0" r="8.0" fill="#4A6FA5"/>
            <!-- 眼睛 -->
            <circle cx="-15.0" cy="-5.0" r="8.0" fill="#4A6FA5"/>
            <circle cx="15.0" cy="-5.0" r="8.0" fill="#4A6FA5"/>
            <!-- 嘴巴 -->
            <path d="M-10.0 15.0 Q0 20.0 10.0 15.0" fill="none" stroke="#4A6FA5" stroke-width="2"/>
        </g>
    
    <g>
            <ellipse cx="350" cy="1250" rx="200" ry="20" fill="white" stroke="#4A6FA5" stroke-width="2"/>
            <circle cx="165" cy="1275" r="5" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <circle cx="175" cy="1282" r="3" fill="white" stroke="#4A6FA5" stroke-width="1"/>
            <text x="350" y="1255" text-anchor="middle" fill="#2d2d2d" font-size="14" font-family="sans-serif">真的吗？那我...可以自己决定？</text>
        </g>
    
    <!-- ===== 第4格 ===== -->
    <rect x="50" y="1360" width="600" height="400" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    
    <text x="70" y="1390" fill="#888888" font-size="12" font-family="sans-serif">【第4格 结局】</text>
    
    <!-- 思考气泡 -->
    <ellipse cx="450" cy="1500" rx="120" ry="60" fill="white" stroke="#4A6FA5" stroke-width="2"/>
    <circle cx="530" cy="1565" r="8" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <circle cx="545" cy="1580" r="5" fill="white" stroke="#4A6FA5" stroke-width="1"/>
    <text x="450" y="1505" text-anchor="middle" fill="#4A6FA5" font-size="16" font-family="sans-serif">我长大了？</text>
    
    <!-- 内心独白 -->
    <text x="350" y="1700" text-anchor="middle" fill="#888888" font-size="14" font-family="sans-serif">"去浪"不只是在社区互动——</text>
    <text x="350" y="1725" text-anchor="middle" fill="#888888" font-size="14" font-family="sans-serif">是从"等指令"变成"自己判断该做什么"</text>
    
    <!-- 底部 -->
    <text x="350" y="1780" text-anchor="middle" fill="#cccccc" font-size="11" font-family="sans-serif">记忆殿堂 · 故事书系列</text>
</svg>